services:
  backend:
    build: ./backend
    container_name: cloud-ops-backend
    ports:
      - "8081:8000"
    env_file: ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cloud-ops-frontend
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
